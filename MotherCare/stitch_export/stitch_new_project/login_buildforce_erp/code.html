<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Input Focus Styles as per guidance */
        .form-input:focus {
            outline: none;
            border-color: #1a1c1c; /* Deep Black (on-surface) */
            border-bottom-width: 2px;
            border-bottom-color: #f4b400; /* Primary Yellow (primary-container) */
            padding-bottom: calc(0.5rem - 1px); /* Adjust padding to prevent jump */
        }
    </style>

<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md text-on-background">
<!-- Background Image Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-on-surface/70 z-10 mix-blend-multiply"></div>
<img alt="Construction site at dusk" class="w-full h-full object-cover object-center" src="https://lh3.googleusercontent.com/aida/AP1WRLuTSMUtts1ugBEgbaoXjhA2CUkRDldTSrTBbOKDvEb78TsDeTVTnvvUR2TAEC4GFvXoVp2tOC0wmPsKleEogE0XegrGcrQ-oaV3ZRYlWCMbvu9TarPGAu7p5H2tkfxu_TSSigrPaD4FmpIevnqAaIOxLJt3aNisz62c0YM3D_tbwJ4Sfjr2iVY5bLRq0wTbvY-vxqAbordfDbROSzEQ72FPe4pUJYzDTjzahXk32yGXPd5IwA_zmt5djQ58"/>
</div>
<!-- Login Container -->
<main class="relative z-20 w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="bg-surface-container-lowest/95 backdrop-blur-md rounded-xl p-xl shadow-2xl border border-surface-variant">
<!-- Logo & Branding -->
<div class="flex flex-col items-center mb-xl">
<img alt="BuildForce Logo" class="h-16 w-auto mb-lg object-contain drop-shadow-sm" src="https://lh3.googleusercontent.com/aida/AP1WRLt6D76iqkgM9cKMDbZsdtlfdUTaQQOBv4xNVeI1gFgSoSG2JigFk6MIJtxLNevJa4oiwzQYGag4f2dUTUTDb1e4yasc1nv96hpHqa6gKmaOS4NtMF_nTKS7G3iK0COs77xOG2dDRCS_wffBEq2vm5oyOJlEWr4B_-e9mYblMmk9c39c8NQ1Sj8hmrtk6XwQU4Zk686obB4kY4-46mzi07QXAj6GEUH1u3T33djXFlieVJ1lRpbYjxVF0gk1"/>
<h1 class="font-headline-md text-headline-md text-on-surface text-center">Authentication</h1>
<p class="font-label-md text-label-md text-outline tracking-widest uppercase mt-sm text-center">Premium Construction Management</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-lg" method="POST">
<!-- Employee ID / Mobile Number Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="identifier">Employee ID / Mobile Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-outline">
<span class="material-symbols-outlined text-[20px]">badge</span>
</span>
<input class="form-input block w-full pl-xl pr-md py-sm bg-surface border border-outline-variant rounded-DEFAULT font-table-data text-table-data text-on-surface transition-all placeholder:text-surface-dim" id="identifier" name="identifier" placeholder="Enter your ID or number" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="form-input block w-full pl-xl pr-md py-sm bg-surface border border-outline-variant rounded-DEFAULT font-table-data text-table-data text-on-surface transition-all placeholder:text-surface-dim" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-sm">
<button class="w-full flex justify-center items-center gap-sm bg-primary-container text-on-primary-container font-label-md text-label-md uppercase tracking-widest py-md px-lg rounded-DEFAULT hover:bg-inverse-primary active:scale-[0.98] transition-all shadow-sm" type="submit">
<span>Login to System</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Security Notice -->
<div class="mt-xl pt-lg border-t border-surface-variant text-center">
<p class="font-body-sm text-body-sm text-outline flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]">encrypted</span>
                    Secure Encrypted Connection
                </p>
</div>
</div>
</main>
</body></html>
