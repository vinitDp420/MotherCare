        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - available
          - cleaning
          - maintenance
          - occupied
          - reserved
        description: |-
          Real-time status of the bed.

          * `available` - Available
          * `occupied` - Occupied
          * `cleaning` - Cleaning
          * `maintenance` - Maintenance
          * `reserved` - Reserved
      - in: query
        name: ward_type
        schema:
          type: string
          enum:
          - general
          - icu
          - labor
          - nicu
          - private
        description: |-
          Type of ward.

          * `general` - General
          * `private` - Private
          * `labor` - Labor
          * `nicu` - NICU
          * `icu` - ICU
      tags:
      - beds
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBedList'
          description: ''
    post:
