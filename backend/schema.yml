          type: string
          readOnly: true
        consultation:
          type: string
          format: uuid
          description: Optional — test may be ordered outside a consultation. [BR-LAB-04]
          readOnly: true
          nullable: true
        test_type:
          allOf:
          - $ref: '#/components/schemas/TestTypeEnum'
          readOnly: true
          description: |-
            Type of lab test. Must be from the standard test type list.

            * `cbc` - Complete Blood Count (CBC)
            * `blood_group` - Blood Group & Rh Typing
            * `hba1c` - HbA1c
            * `glucose_fasting` - Fasting Glucose
            * `glucose_pp` - Post-Prandial Glucose
            * `ogtt` - OGTT (Oral Glucose Tolerance)
            * `urine_routine` - Urine Routine
            * `urine_culture` - Urine Culture & Sensitivity
            * `thyroid` - Thyroid Function (TSH/T3/T4)
            * `liver_function` - Liver Function Test (LFT)
            * `kidney_function` - Kidney Function Test (KFT)
            * `serum_ferritin` - Serum Ferritin
            * `vitamin_d` - Vitamin D (25-OH)
            * `vdrl` - VDRL/RPR
            * `hiv` - HIV Screening
            * `hbsag` - HBsAg
            * `hcv` - HCV Antibody
            * `torch` - TORCH Panel
            * `anomaly_scan` - Anomaly Scan (USG)
            * `nt_scan` - NT Scan (Nuchal Translucency)
            * `growth_scan` - Growth Scan (USG)
            * `doppler` - Doppler Study
            * `other` - Other
        test_type_display:
          type: string
          readOnly: true
        urgency:
          allOf:
          - $ref: '#/components/schemas/Urgency50cEnum'
          readOnly: true
          description: |-
            Priority: stat (immediate) > urgent > routine. [BR-LAB-03]

            * `stat` - STAT (Immediate)
            * `urgent` - Urgent
            * `routine` - Routine
        urgency_display:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusD40Enum'
          readOnly: true
          description: |-
            Lab test lifecycle status.

            * `pending` - Pending
            * `in_progress` - In Progress
            * `completed` - Completed
            * `cancelled` - Cancelled
            * `critical` - Critical
        status_display:
          type: string
          readOnly: true
        requested_at:
          type: string
          format: date-time
          readOnly: true
          description: When the test was ordered.
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When results were ready. Set automatically on completion.
        flagged:
          type: boolean
          readOnly: true
          description: Set True when results require immediate clinical attention.
            Auto-set when status = critical. [BR-LAB-02]
        is_terminal:
          type: boolean
          readOnly: true
        is_critical:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Record creation timestamp (UTC). Set once, never modified.
        key_findings:
          type: string
          readOnly: true
          description: Summary of lab findings populated by lab technician when completing.
        report_files:
          type: array
          items:
            $ref: '#/components/schemas/LabReportFile'
          readOnly: true
