openapi: 3.0.3
info:
  title: MotherCare API
  version: 1.0.0
  description: Maternity Hospital Information System — MotherCare Hospital
paths:
  /api/v1/admissions/:
    get:
      operationId: admissions_list
      description: |-
        Mixin for ModelViewSet subclasses that should use soft delete
        instead of hard DELETE.

        Overrides destroy() to call model.soft_delete() instead of model.delete().
        Adds a restore() action for admin use.
      parameters:
      - in: query
        name: admission_type
        schema:
          type: string
          enum:
          - emergency
          - maternity
          - post_natal
          - surgery
        description: |-
          Type of admission.

          * `maternity` - Maternity
          * `post_natal` - Post Natal
          * `emergency` - Emergency
          * `surgery` - Surgery
      - in: query
        name: bed
        schema:
          type: string
          format: uuid
        description: UUID primary key — never expose raw to client without masking.
      - in: query
        name: doctor
        schema:
          type: string
          format: uuid
        description: UUID primary key — never expose raw to client without masking.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: patient
        schema:
          type: string
          format: uuid
        description: UUID primary key — never expose raw to client without masking.
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - deceased
          - discharge_pending
          - discharged
          - transferred
        description: |-
          Clinical state of the admission.

          * `active` - Active
          * `discharge_pending` - Discharge Pending
          * `discharged` - Discharged
          * `transferred` - Transferred
          * `deceased` - Deceased
      tags:
      - admissions
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdmissionListList'
          description: ''
    post:
      operationId: admissions_create
      description: |-
        Mixin for ModelViewSet subclasses that should use soft delete
        instead of hard DELETE.

        Overrides destroy() to call model.soft_delete() instead of model.delete().
        Adds a restore() action for admin use.
      tags:
      - admissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdmissionWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdmissionWriteRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionWrite'
          description: ''
  /api/v1/admissions/{id}/:
    get:
      operationId: admissions_retrieve
      description: |-
        Mixin for ModelViewSet subclasses that should use soft delete
