      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdmissionWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdmissionWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdmissionWriteRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionWrite'
          description: ''
    delete:
      operationId: admissions_destroy
      description: Perform soft delete instead of hard DELETE.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: UUID primary key — never expose raw to client without masking.
        required: true
      tags:
      - admissions
      responses:
        '204':
          description: No response body
