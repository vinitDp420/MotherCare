  /api/v1/appointments/appointments/:
    get:
      operationId: appointments_appointments_list
      description: |-
        CRUD + status actions for Appointment records.

        list:     GET  /api/v1/appointments/
        retrieve: GET  /api/v1/appointments/{id}/
        create:   POST /api/v1/appointments/
        update:   PATCH /api/v1/appointments/{id}/

        Soft delete (destroy) is NOT exposed — appointments use status cancellation.
      parameters:
      - in: query
        name: appointment_datetime
        schema:
          type: string
          format: date-time
      - in: query
        name: appointment_type
        schema:
          type: string
          enum:
          - anc
          - emergency
          - follow_up
          - gdm_screen
          - lab_review
          - new_patient
          - scan
          - ultrasound
        description: |-
          Type of appointment: new_patient | follow_up | anc | emergency | ...

          * `new_patient` - New Patient
          * `follow_up` - Follow-up
          * `anc` - Antenatal Care (ANC)
          * `emergency` - Emergency
          * `scan` - Scan
          * `lab_review` - Lab Review
          * `gdm_screen` - GDM Screening
          * `ultrasound` - Ultrasound
      - in: query
        name: doctor
        schema:
          type: string
          format: uuid
        description: UUID primary key — never expose raw to client without masking.
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: patient
        schema:
          type: string
          format: uuid
        description: UUID primary key — never expose raw to client without masking.
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - confirmed
          - in_progress
          - no_show
          - scheduled
        description: |-
          Appointment status. Transitions are one-directional (BR-APPT-07).

          * `scheduled` - Scheduled
          * `confirmed` - Confirmed
          * `in_progress` - In Progress
          * `completed` - Completed
          * `cancelled` - Cancelled
          * `no_show` - No Show
      tags:
      - appointments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentListList'
          description: ''
    post:
      operationId: appointments_appointments_create
      description: |-
        CRUD + status actions for Appointment records.

        list:     GET  /api/v1/appointments/
        retrieve: GET  /api/v1/appointments/{id}/
        create:   POST /api/v1/appointments/
        update:   PATCH /api/v1/appointments/{id}/

        Soft delete (destroy) is NOT exposed — appointments use status cancellation.
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentWriteRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentWrite'
          description: ''
