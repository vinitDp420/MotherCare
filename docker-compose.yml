version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: mothercare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mothercare}
      POSTGRES_USER: ${POSTGRES_USER:-mothercare_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mothercare_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mothercare_user} -d ${POSTGRES_DB:-mothercare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mothercare_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mothercare_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mothercare_user}:${POSTGRES_PASSWORD:-mothercare_secret}@db:5432/${POSTGRES_DB:-mothercare}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
  redis_data:
  media_files:
